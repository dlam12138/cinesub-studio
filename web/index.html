<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>电影字幕识别</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f6f7f9;
      --panel: #ffffff;
      --text: #1d232a;
      --muted: #667085;
      --line: #dde2e8;
      --primary: #1f6feb;
      --primary-dark: #174ea6;
      --danger: #b42318;
      --ok: #067647;
      --radius: 8px;
    }

    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: "Segoe UI", "Microsoft YaHei", Arial, sans-serif;
      background: var(--bg);
      color: var(--text);
    }

    header {
      padding: 22px 28px 12px;
      border-bottom: 1px solid var(--line);
      background: var(--panel);
    }

    h1 {
      margin: 0 0 6px;
      font-size: 24px;
      font-weight: 650;
    }

    .sub {
      margin: 0;
      color: var(--muted);
      font-size: 14px;
    }

    main {
      display: grid;
      grid-template-columns: minmax(320px, 440px) minmax(0, 1fr);
      gap: 18px;
      padding: 18px 28px 28px;
      max-width: 1380px;
      margin: 0 auto;
    }

    section {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: var(--radius);
      padding: 18px;
    }

    h2 {
      margin: 0 0 16px;
      font-size: 17px;
    }

    label {
      display: block;
      margin: 14px 0 6px;
      font-size: 13px;
      color: #344054;
      font-weight: 600;
    }

    input, select, textarea {
      width: 100%;
      min-height: 38px;
      border: 1px solid #cbd5e1;
      border-radius: 6px;
      padding: 8px 10px;
      font: inherit;
      background: #fff;
      color: var(--text);
    }

    textarea {
      resize: vertical;
      min-height: 58px;
    }

    input:disabled, select:disabled, textarea:disabled {
      opacity: 0.5;
      background: #f1f3f5;
    }

    input[type="file"] {
      padding: 7px;
    }

    .row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }

    .check {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-top: 14px;
      color: #344054;
      font-size: 14px;
    }

    .check input {
      width: auto;
      min-height: auto;
    }

    button {
      width: 100%;
      margin-top: 18px;
      min-height: 42px;
      border: 0;
      border-radius: 6px;
      background: var(--primary);
      color: #fff;
      font: inherit;
      font-weight: 650;
      cursor: pointer;
    }

    button:hover { background: var(--primary-dark); }
    button:disabled {
      opacity: .55;
      cursor: not-allowed;
    }

    .status {
      display: flex;
      gap: 10px;
      align-items: center;
      margin-bottom: 14px;
      flex-wrap: wrap;
    }

    .badge {
      display: inline-flex;
      align-items: center;
      min-height: 26px;
      border-radius: 999px;
      padding: 3px 10px;
      font-size: 13px;
      font-weight: 650;
      background: #eef2f6;
      color: #344054;
    }

    .badge.running { background: #e0ecff; color: #1849a9; }
    .badge.done { background: #dcfae6; color: var(--ok); }
    .badge.failed { background: #fee4e2; color: var(--danger); }

    .download {
      color: var(--primary);
      font-weight: 650;
      text-decoration: none;
    }

    .log {
      min-height: 460px;
      max-height: calc(100vh - 240px);
      overflow: auto;
      padding: 12px;
      border: 1px solid #cbd5e1;
      border-radius: 6px;
      background: #101828;
      color: #d0d5dd;
      font-family: Consolas, "Courier New", monospace;
      font-size: 13px;
      line-height: 1.55;
      white-space: pre-wrap;
    }

    .hint {
      margin-top: 10px;
      color: var(--muted);
      font-size: 13px;
      line-height: 1.5;
    }

    @media (max-width: 900px) {
      main {
        grid-template-columns: 1fr;
        padding: 14px;
      }

      header {
        padding: 18px 14px 12px;
      }
    }
  </style>
</head>
<body>
  <header>
    <h1>电影字幕识别</h1>
    <p class="sub">本地 faster-whisper 控制台，模型、缓存和输出都保存在当前项目目录。</p>
  </header>

  <main>
    <section>
      <h2>识别设置</h2>
      <form id="jobForm">
        <label for="file">上传视频或音频</label>
        <input id="file" name="file" type="file" accept="video/*,audio/*,.mkv,.srt,.wav,.mp3,.m4a,.flac,.opus">

        <label for="path">或填写本机文件路径</label>
        <input id="path" name="path" type="text" placeholder="D:\Movies\movie.mp4">

        <div class="row">
          <div>
            <label for="model">模型</label>
            <select id="model" name="model">
              <option value="tiny">tiny - 快速测试</option>
              <option value="base">base - 轻量</option>
              <option value="small" selected>small - CPU 推荐</option>
              <option value="medium">medium - 效果更好</option>
              <option value="large-v3">large-v3 - 高质量</option>
              <option value="distil-large-v3">distil-large-v3</option>
            </select>
          </div>
          <div>
            <label for="device">设备</label>
            <select id="device" name="device">
              <option value="cpu" selected>CPU</option>
              <option value="cuda">NVIDIA CUDA</option>
              <option value="auto">自动</option>
            </select>
          </div>
        </div>

        <div class="row">
          <div>
            <label for="compute_type">计算精度</label>
            <select id="compute_type" name="compute_type">
              <option value="">自动</option>
              <option value="int8">int8 - CPU 省内存</option>
              <option value="float16">float16 - GPU</option>
              <option value="float32">float32</option>
            </select>
          </div>
          <div>
            <label for="language">源语言</label>
            <select id="language" name="language">
              <option value="">自动检测</option>
              <option value="en">英语 en</option>
              <option value="zh">中文 zh</option>
              <option value="ja">日语 ja</option>
              <option value="ko">韩语 ko</option>
              <option value="fr">法语 fr</option>
              <option value="de">德语 de</option>
              <option value="es">西语 es</option>
              <option value="ru">俄语 ru</option>
            </select>
          </div>
        </div>

        <label for="hf_endpoint">模型下载源</label>
        <select id="hf_endpoint" name="hf_endpoint">
          <option value="">Hugging Face 官方</option>
          <option value="https://hf-mirror.com" selected>hf-mirror.com 镜像</option>
        </select>

        <label for="beam_size">Beam size</label>
        <input id="beam_size" name="beam_size" type="number" min="1" max="10" value="5">

        <label class="check">
          <input id="vad" name="vad" type="checkbox" checked>
          启用静音过滤 VAD
        </label>

        <label class="check">
          <input id="local_files_only" name="local_files_only" type="checkbox">
          只使用本地已下载模型
        </label>

        <hr style="border:0; border-top:1px solid var(--line); margin: 18px 0 12px;">

        <h2>翻译设置</h2>

        <label class="check">
          <input id="translate_enabled" name="translate_enabled" type="checkbox">
          启用大模型翻译
        </label>

        <label for="api_provider">API 协议</label>
        <select id="api_provider" name="api_provider" disabled>
          <option value="openai-compatible" selected>OpenAI-Compatible</option>
          <option value="anthropic">Anthropic Claude</option>
        </select>

        <label for="api_base">API Base URL</label>
        <input id="api_base" name="api_base" type="text" disabled
               placeholder="https://api.openai.com/v1">

        <label for="api_key">API Key</label>
        <input id="api_key" name="api_key" type="password" disabled placeholder="sk-...">

        <label for="llm_model">大模型名称</label>
        <input id="llm_model" name="llm_model" type="text" disabled
               placeholder="gpt-4o-mini / qwen-plus / llama3.1 / claude-3-5-sonnet-latest">

        <div class="row">
          <div>
            <label for="target_language">目标语言</label>
            <select id="target_language" name="target_language" disabled>
              <option value="zh-CN" selected>中文 zh-CN</option>
              <option value="zh-TW">繁体中文 zh-TW</option>
              <option value="en">英文 en</option>
              <option value="ja">日文 ja</option>
              <option value="ko">韩文 ko</option>
              <option value="fr">法文 fr</option>
              <option value="de">德文 de</option>
              <option value="es">西文 es</option>
              <option value="ru">俄文 ru</option>
            </select>
          </div>
          <div>
            <label for="translation_mode">翻译模式</label>
            <select id="translation_mode" name="translation_mode" disabled>
              <option value="bilingual" selected>双语 bilingual</option>
              <option value="translated">纯翻译 translated</option>
            </select>
          </div>
        </div>

        <div class="row">
          <div>
            <label for="translation_batch_size">批量大小 (1-50)</label>
            <input id="translation_batch_size" name="translation_batch_size" type="number"
                   min="1" max="50" value="20" disabled>
          </div>
          <div>
            <label for="translation_temperature">Temperature (0-1)</label>
            <input id="translation_temperature" name="translation_temperature" type="number"
                   min="0" max="1" step="0.1" value="0.2" disabled>
          </div>
        </div>

        <label class="check">
          <input id="context_enabled" name="context_enabled" type="checkbox" checked disabled>
          联系上下文
        </label>

        <label for="context_window">上下文窗口 (0-10)</label>
        <input id="context_window" name="context_window" type="number"
               min="0" max="10" value="3" disabled>

        <label for="translation_prompt">自定义翻译提示词（追加到默认提示词后）</label>
        <textarea id="translation_prompt" name="translation_prompt" rows="3" disabled
                  placeholder="用户额外要求…（留空使用默认提示词）"></textarea>

        <button id="startBtn" type="submit">开始识别</button>
      </form>
      <p class="hint">第一次使用某个模型会下载模型文件；后台会忽略系统里失效的代理设置。国内网络可尝试 hf-mirror.com，模型下载完成后可以勾选"只使用本地已下载模型"。<br>翻译使用大模型 API，API Key 不会持久化到磁盘或日志中。</p>
    </section>

    <section>
      <h2>任务状态</h2>
      <div class="status">
        <span id="badge" class="badge">idle</span>
        <a id="downloadSource" class="download" href="#" hidden>下载原文 SRT</a>
        <a id="downloadTranslated" class="download" href="#" hidden>下载双语 SRT</a>
      </div>
      <pre id="log" class="log">等待任务开始。</pre>
    </section>
  </main>

  <script>
    const form = document.getElementById("jobForm");
    const startBtn = document.getElementById("startBtn");
    const badge = document.getElementById("badge");
    const logBox = document.getElementById("log");
    const downloadSource = document.getElementById("downloadSource");
    const downloadTranslated = document.getElementById("downloadTranslated");

    const translateCheck = document.getElementById("translate_enabled");
    const contextCheck = document.getElementById("context_enabled");
    const contextWindow = document.getElementById("context_window");

    let activeJob = null;
    let timer = null;

    // Translation fields that depend on translate_enabled checkbox
    const translateFields = [
      "api_provider", "api_base", "api_key", "llm_model",
      "target_language", "translation_mode", "translation_batch_size",
      "translation_temperature", "context_enabled", "context_window",
      "translation_prompt",
    ];

    function setTranslateFieldsDisabled(disabled) {
      translateFields.forEach(function(name) {
        var el = document.getElementById(name);
        if (el) el.disabled = disabled;
      });
      // context_window is also controlled by context_enabled
      if (!disabled && contextCheck.checked) {
        contextWindow.disabled = false;
      }
    }

    translateCheck.addEventListener("change", function() {
      setTranslateFieldsDisabled(!this.checked);
      // Reset context state when toggling translation
      if (this.checked) {
        contextCheck.checked = true;
        contextWindow.value = "3";
        contextWindow.disabled = false;
      }
    });

    contextCheck.addEventListener("change", function() {
      contextWindow.disabled = !this.checked;
      if (!this.checked) {
        contextWindow.value = "0";
      } else if (contextWindow.value === "0") {
        contextWindow.value = "3";
      }
    });

    form.addEventListener("submit", async function(event) {
      event.preventDefault();
      var file = document.getElementById("file").files[0];
      var path = document.getElementById("path").value.trim();
      if (!file && !path) {
        alert("请选择文件，或填写本机文件路径。");
        return;
      }

      if (translateCheck.checked) {
        var apiBase = document.getElementById("api_base").value.trim();
        var apiKey = document.getElementById("api_key").value.trim();
        var llmModel = document.getElementById("llm_model").value.trim();
        if (!apiBase) { alert("翻译已启用，请填写 API Base URL。"); return; }
        if (!apiKey) { alert("翻译已启用，请填写 API Key。"); return; }
        if (!llmModel) { alert("翻译已启用，请填写大模型名称。"); return; }
      }

      startBtn.disabled = true;
      setStatus("queued");
      logBox.textContent = "Uploading / creating job...\n";
      downloadSource.hidden = true;
      downloadTranslated.hidden = true;

      try {
        var response = await fetch("/api/jobs", {
          method: "POST",
          body: new FormData(form),
        });
        var payload = await response.json();
        if (!response.ok) throw new Error(payload.error || "创建任务失败");
        activeJob = payload.id;
        pollJob();
        timer = setInterval(pollJob, 1200);
      } catch (err) {
        setStatus("failed");
        logBox.textContent += String(err.message || err) + "\n";
        startBtn.disabled = false;
      }
    });

    async function pollJob() {
      if (!activeJob) return;
      var response = await fetch("/api/jobs/" + activeJob);
      var job = await response.json();
      if (!response.ok) {
        logBox.textContent += (job.error || "状态读取失败") + "\n";
        return;
      }

      setStatus(job.status);
      logBox.textContent = (job.logs || []).join("\n");
      logBox.scrollTop = logBox.scrollHeight;

      if (job.status === "done" || job.status === "failed") {
        clearInterval(timer);
        startBtn.disabled = false;
      }

      if (job.status === "done") {
        if (job.source_output) {
          downloadSource.href = "/download?job=" + job.id + "&type=source";
          downloadSource.hidden = false;
        }
        if (job.translated_output) {
          downloadTranslated.href = "/download?job=" + job.id + "&type=translated";
          downloadTranslated.hidden = false;
        }
        // Fallback: if only "output" exists and no separate paths
        if (!job.source_output && !job.translated_output && job.output) {
          downloadSource.textContent = "下载 SRT";
          downloadSource.href = "/download?job=" + job.id;
          downloadSource.hidden = false;
        }
      }
    }

    function setStatus(status) {
      badge.textContent = status;
      badge.className = "badge " + status;
    }
  </script>
</body>
</html>
